{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en" class="{% if dark_mode %}dark{% endif %}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% endblock title %}</title>

    {% tailwind_css %}
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Google Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=domain" />

    <style>
        .dark {
            color-scheme: dark;
        }
    </style>

    <meta name="csrf-token" content="{{ csrf_token }}">

    <!-- =========================================================================== -->
    <!-- ========================( Vue JS Connection )============================== -->
    {% if live %}
    <!-- Production build files -->
    <link rel="stylesheet" href="{% static 'vue/assets/style.css' %}">
    <script type="module" src="{% static 'vue/assets/main.js' %}"></script>
    {% else %}
    <!-- Vite Dev Server during development -->
    <script type="module" src="http://localhost:5173/@vite/client"></script>
    <script type="module" src="http://localhost:5173/src/main.js"></script>
    {% endif %}

    {% block styles %}{% endblock styles %}
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200">

    <div id="app">
        {% block content %}{% endblock content %}
        
    </div>

    <script>
        // Make it accessible globally
        window.accessToken = "{{ jwt_access_token|escapejs }}";
        window.user_id = "{{ request.user.id|escapejs }}";
        window.user_groups = "{{ user_groups_list|escapejs }}";
        window.user_permissions = "{{ user_permissions_list|escapejs }}";
    </script>
    {% block js %}{% endblock js %}
</body>

</html>
