{% load static tailwind_tags %}
<header id="header"
    class="flex items-center justify-between bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 py-1 shadow-sm">
    <div class="flex items-center gap-3">
        <!-- Desktop: Toggle First, Then Title -->
        <div class="hidden lg:flex items-center gap-3" style="margin-left: -37px;">
            <!-- Sidebar Toggle (Desktop - Left of Title) -->
            <button id="sidebarToggleDesktop" class="group relative p-2 rounded-full bg-amber-400  dark:bg-white
                       border border-gray-200 dark:border-gray-700
                       shadow-sm hover:shadow-md
                       hover:bg-amber-500 dark:hover:bg-gray-200
                       transition-all duration-200
                       flex items-center justify-center">

                <i id="sidebarToggleIconDesktop" class="fas fa-chevron-left
              text-sm transition-transform duration-300 text-slate-800 dark:text-slate-900
              group-hover:scale-110">
                </i>

                <span class="absolute left-full ml-2 top-1/2 -translate-y-1/2
                 px-2 py-1 text-xs font-medium text-white bg-gray-900 dark:bg-gray-100
                 dark:text-gray-900 rounded opacity-0 group-hover:opacity-100
                 pointer-events-none transition-opacity whitespace-nowrap">
                    Toggle Sidebar
                </span>
            </button>

            <!-- Title -->
            <h1 class="font-semibold text-lg">Astha Dashboard</h1>
        </div>

        <!-- Mobile: Logo + Title + Toggle (Right) -->
        <div class="flex lg:hidden items-center gap-2 w-full justify-between">
            <div class="flex items-center gap-2">
                <!-- Logo (Mobile Only) -->
                <img src="{% static 'assets/logo/demo_logo.png' %}" alt="Logo" class="h-7 w-7" />
                <!-- Title -->
                <h1 class="font-semibold text-lg">Asth Dashboard</h1>
            </div>

            <!-- Sidebar Toggle (Mobile - Right Side) -->
            <button id="sidebarToggleMobile" class="group relative p-2 rounded-full bg-amber-400  dark:bg-white
                       border border-gray-200 dark:border-gray-700
                       shadow-sm hover:shadow-md
                       hover:bg-amber-500 dark:hover:bg-gray-200
                       transition-all duration-200
                       flex items-center justify-center">

                <i id="sidebarToggleIconMobile" class="fas fa-chevron-right text-slate-800 dark:text-slate-900
              text-sm transition-transform duration-300
              group-hover:scale-110">
                </i>

                <span class="absolute left-1/2 -translate-x-1/2 top-full mt-1
                 px-2 py-1 text-xs font-medium text-white bg-gray-900 dark:bg-gray-100
                 dark:text-gray-900 rounded opacity-0 group-hover:opacity-100
                 pointer-events-none transition-opacity whitespace-nowrap">
                    Toggle Sidebar
                </span>
            </button>
        </div>
    </div>

    <!-- Desktop: Full Actions -->
    <div class="hidden lg:flex items-center gap-3">
        <!-- Notifications -->
        <div class="relative">
            {% include 'layouts/partial/notification_dropdown.html' %}
        </div>

        <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
            <i class="fas fa-moon"></i>
        </button>

        <button id="fullscreenToggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
            <i class="fas fa-expand"></i>
        </button>

        <div class="relative">
            {% include 'layouts/partial/user_dropdown.html' %}
        </div>
    </div>

    <!-- Mobile: Ellipsis Menu -->
    <div class="flex lg:hidden">
        <button id="mobileMenuBtn" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
            <i class="fa-solid fa-ellipsis-vertical text-gray-600 dark:text-gray-300"></i>
        </button>
    </div>

    <!-- Mobile Menu (Sidebar Extension Style) -->
    <div id="mobileMenu" class="fixed inset-0 bg-black/60 z-50 hidden">
        <div id="mobileMenuPanel" class="fixed left-0 right-0 top-14 h-[calc(100vh-3.5rem)] bg-white dark:bg-gray-800
                rounded-t-3xl shadow-2xl flex flex-col overflow-hidden
                translate-y-full transition-transform duration-300 ease-out lg:hidden">

            <!-- Handle Bar -->
            <div class="flex justify-center py-2">
                <div class="w-12 h-1 bg-gray-300 dark:bg-gray-600 rounded-full"></div>
            </div>

            <!-- Close Button (Top-Right) -->
            <div class="absolute top-7 right-2 z-10">
                <button id="closeMobileMenu"
                    class="p-2 rounded-full bg-white/20 hover:bg-white/30 text-white transition-colors">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>

            <!-- User Section -->
            <div
                class="px-6 py-4 bg-gradient-to-r {{ sidebar_colors.sidebar_bg_from }} {{ sidebar_colors.sidebar_bg_to }} text-white">
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=ffffff&color=6b46c1&bold=true"
                            class="w-14 h-14 rounded-full ring-4 ring-white" alt="user" />
                        <span
                            class="absolute bottom-0 right-0 w-4 h-4 bg-green-400 rounded-full ring-2 ring-white"></span>
                    </div>
                    <div>
                        <p class="font-semibold text-lg">Hizrian</p>
                        <p class="text-sm opacity-90">hello@example.com</p>
                    </div>
                </div>
                <button
                    class="mt-3 w-full bg-white/20 hover:bg-white/30 text-white font-medium py-2 rounded-lg transition-colors">
                    View Profile
                </button>
            </div>

            <!-- Menu Items -->
            <div class="flex-1 overflow-y-auto px-4 py-3 space-y-1">
                <a href="#"
                    class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <i class="fas fa-user text-purple-600 w-5"></i>
                    <span class="flex-1 text-sm font-medium">My Profile</span>
                </a>
                <a href="#"
                    class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <i class="fas fa-cog text-gray-600 w-5"></i>
                    <span class="flex-1 text-sm font-medium">Account Setting</span>
                </a>

                <div class="border-t border-gray-200 dark:border-gray-700 my-3"></div>

                <a id="mobileNotificationBtn"
                    class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors relative">
                    <i class="fas fa-bell text-yellow-600 w-5"></i>
                    <span class="flex-1 text-sm font-medium">Notifications</span>
                    <span class="text-xs bg-red-500 text-white px-2 py-0.5 rounded-full">5</span>
                </a>

                <a id="mobileThemeToggle"
                    class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <i class="fas fa-moon text-indigo-600 w-5"></i>
                    <span class="flex-1 text-sm font-medium">Toggle Theme</span>
                </a>

                <div class="border-t border-gray-200 dark:border-gray-700 my-3"></div>

                <a href="{% url 'auth:logout' %}"
                    class="flex items-center gap-3 p-3 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/20 text-red-600 dark:text-red-400 transition-colors">
                    <i class="fas fa-sign-out-alt w-5"></i>
                    <span class="flex-1 text-sm font-medium">Logout</span>
                </a>
            </div>
        </div>
    </div>
</header>
